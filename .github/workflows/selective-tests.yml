name: selective-tests

on:
  pull_request:
    branches:
      - develop
      - staging
      - main
  push:
    branches:
      - main

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run selective strategy
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_NAME}" == "main" ]]; then
            npm run test:ci:prod
          elif [[ "${GITHUB_BASE_REF}" == "main" ]]; then
            npm run test:ci:prod
          elif [[ "${GITHUB_BASE_REF}" == "staging" ]]; then
            npm run test:ci:stg -- --base=${{ github.event.pull_request.base.sha }} --head=${{ github.event.pull_request.head.sha }}
          else
            npm run test:ci:dev -- --base=${{ github.event.pull_request.base.sha }} --head=${{ github.event.pull_request.head.sha }}
          fi
