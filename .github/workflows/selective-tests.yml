name: selective-tests

on:
  pull_request:
    branches:
      - develop
      - staging
      - main
  push:
    branches:
      - main
      - develop
      - staging

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run selective strategy
        shell: bash
        env:
          BASE_SHA: ${{ github.event_name == 'push' && github.event.before || github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event_name == 'push' && github.event.after || github.event.pull_request.head.sha }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_NAME}" == "main" ]]; then
            npm run test:ci:prod
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && ("${GITHUB_REF_NAME}" == "develop" || "${GITHUB_REF_NAME}" == "staging") ]]; then
            if [[ "${BASE_SHA}" == "0000000000000000000000000000000000000000" ]]; then
              npm run test:ci:prod
            else
              if [[ "${GITHUB_REF_NAME}" == "staging" ]]; then
                npm run test:ci:stg -- --base=${BASE_SHA} --head=${HEAD_SHA}
              else
                npm run test:ci:dev -- --base=${BASE_SHA} --head=${HEAD_SHA}
              fi
            fi
          elif [[ "${GITHUB_BASE_REF}" == "main" ]]; then
            npm run test:ci:prod
          elif [[ "${GITHUB_BASE_REF}" == "staging" ]]; then
            npm run test:ci:stg -- --base=${BASE_SHA} --head=${HEAD_SHA}
          else
            npm run test:ci:dev -- --base=${BASE_SHA} --head=${HEAD_SHA}
          fi
